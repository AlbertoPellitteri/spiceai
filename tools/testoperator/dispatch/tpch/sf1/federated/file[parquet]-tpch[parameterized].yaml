tests:
  bench:
    spicepod_path: federated/file[parquet].yaml
    query_set: tpch[parameterized]
    runner_type: spiceai-dev-runners
    validate_results: true
  throughput:
    spicepod_path: federated/file[parquet].yaml
    query_set: tpch[parameterized]
    runner_type: spiceai-dev-large-runners
  load:
    spicepod_path: federated/file[parquet].yaml
    query_set: tpch[parameterized]
    runner_type: spiceai-dev-large-runners
    duration: 28800