name: Generate Spiceschema OpenAPI

on:
  pull_request:
    branches:
      - trunk
    paths:
      - "tools/spiceschema/**"
      - "crates/**"

permissions:
  contents: write

jobs:
  generate_openapi:
    runs-on: ubuntu-latest

    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Install Rust stable
        run: rustup toolchain install stable --profile minimal

      - name: Build Cargo project
        run: cargo build --manifest-path tools/spiceschema/Cargo.toml

      - name: Generate OpenAPI JSON
        run: |
          cargo run --manifest-path tools/spiceschema/Cargo.toml -- http --json > .schema/openapi.json

      - name: Verify .schema/openapi.json exists
        run: |
          if [ ! -f ".schema/openapi.json" ]; then
            echo "ERROR: .schema/openapi.json was not generated."
            exit 1
          fi

      - name: Commit & push updated OpenAPI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'Spice Schema Bot'
          git config --global user.email 'schema-bot@spice.ai'
          
          # see if there are any changes
          if git diff --quiet .schema/openapi.json; then
            echo "✅ openapi.json is up to date; nothing to commit."
          else
            echo "📝 openapi.json changed; committing and pushing back to PR branch."
            git add .schema/openapi.json
            git commit -m "chore: update openapi.json"
            git push origin HEAD:${{ github.head_ref }}
          fi
