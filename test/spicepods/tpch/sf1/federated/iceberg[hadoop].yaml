version: v1
kind: Spicepod
name: iceberg[hadoop]-federated

datasets:
  - from: iceberg:s3a://benchmarks/hadoop/tpch/customer
    name: customer
    params: &hadoop_params
      iceberg_s3_endpoint: ${secrets:S3_ENDPOINT}
      iceberg_s3_access_key_id: ${secrets:S3_KEY}
      iceberg_s3_secret_access_key: ${secrets:S3_SECRET}
      iceberg_s3_region: us-east-1
  - from: iceberg:s3a://benchmarks/hadoop/tpch/lineitem
    name: lineitem
    params: *hadoop_params
  - from: iceberg:s3a://benchmarks/hadoop/tpch/nation
    name: nation
    params: *hadoop_params
  - from: iceberg:s3a://benchmarks/hadoop/tpch/orders
    name: orders
    params: *hadoop_params
  - from: iceberg:s3a://benchmarks/hadoop/tpch/part
    name: part
    params: *hadoop_params
  - from: iceberg:s3a://benchmarks/hadoop/tpch/partsupp
    name: partsupp
    params: *hadoop_params
  - from: iceberg:s3a://benchmarks/hadoop/tpch/region
    name: region
    params: *hadoop_params
  - from: iceberg:s3a://benchmarks/hadoop/tpch/supplier
    name: supplier
    params: *hadoop_params
