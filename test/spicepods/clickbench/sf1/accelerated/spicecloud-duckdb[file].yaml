version: v1
kind: Spicepod
name: spicecloud-duckdb[file]
datasets:
  - from: spice.ai:spiceai/benchmarks-clickbench/datasets/clickbench.hits
    name: hits
    acceleration:
      enabled: true
      engine: duckdb
      mode: file
      params:
        duckdb_memory_limit: 50gb
    params:
      spiceai_api_key: ${secrets:SPICEAI_CLICKBENCH_API_KEY}