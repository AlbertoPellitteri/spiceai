version: v1
kind: Spicepod
name: postgres-duckdb[file]
datasets:
  - from: postgres:hits
    name: hits
    acceleration:
      enabled: true
      engine: duckdb
      mode: file
      params:
        duckdb_memory_limit: 50gb
    params:
      pg_host: ${secrets:POSTGRES_HOST}
      pg_port: 5432
      pg_user: postgres
      pg_pass: ${secrets:POSTGRES_PASSWORD}
      pg_db: clickbench
      pg_sslmode: disable